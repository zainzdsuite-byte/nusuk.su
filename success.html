<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تم تقديم الطلب</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="main-header">
    تم تقديم الطلب
  </header>

  <div class="page-wrap">
    <div class="card center-card">
      <h2>تم تقديم الطلب بنجاح</h2>
      <p class="success-text">رقمك المرجعي هو:</p>
      <div class="reference-box" id="referenceNumber">---</div>

      <div class="actions-row">
        <button onclick="window.location.href='search.html'">البحث عن الطلب</button>
        <button class="secondary-btn" onclick="window.location.href='dashboard.html'">العودة للوحة الطلبات</button>
      </div>
    </div>
  </div>

  <script>
    const ref = localStorage.getItem("lastReference");
    document.getElementById("referenceNumber").textContent = ref || "---";
  </script>

</body>
</html>
