<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة طلبات الحج</title>

<style>
body{
  margin:0;
  font-family:Tahoma, Arial, sans-serif;
  direction:rtl;
  background:#f5f5f5;
}

header{
  background:#2f6b4f;
  color:white;
  padding:20px;
  text-align:center;
  font-size:26px;
  font-weight:bold;
}

.container{
  padding:40px;
  max-width:1100px;
  margin:auto;
}

.card{
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.stats{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.stat-box{
  flex:1;
  min-width:220px;
  background:#fafafa;
  border:1px solid #e5e5e5;
  border-radius:10px;
  padding:18px;
}

.stat-box h3{
  margin:0 0 10px 0;
  color:#2f6b4f;
  font-size:20px;
}

.stat-box p{
  margin:0;
  font-size:24px;
  font-weight:bold;
  color:#444;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

th{
  background:#2f6b4f;
  color:white;
}

.note{
  color:#666;
  font-size:14px;
  margin-top:10px;
}

.search-box{
  margin-top:20px;
}

.search-box input{
  padding:10px;
  width:200px;
  border:1px solid #ccc;
  border-radius:6px;
}

.search-box button{
  padding:10px 18px;
  background:#b9963a;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
  margin-right:5px;
}

.search-box button:hover{
  background:#9f812f;
}
</style>
</head>

<body>

<header>
إدارة طلبات الحج
</header>

<div class="container">

<div class="card">
<div class="stats">

<div class="stat-box">
<h3>عدد طلبات الحج المقدمة</h3>
<p id="requestCount">0</p>
</div>

<div class="stat-box">
<h3>عدد الموافقات المتاحة</h3>
<p id="approvalBalance">100</p>
</div>

<div class="stat-box">
<h3>عدد الطلبات الموافق عليها</h3>
<p id="approvedCount">0</p>
</div>

</div>

<div class="note">
لا يوجد حالياً أي طلبات حج مقدمة في النظام.
</div>

<!-- صندوق البحث -->
<div class="search-box">

<h3>البحث عن طلب حج</h3>

<input type="number" id="orderNumber" placeholder="ادخل رقم الطلب">

<button onclick="searchOrder()">بحث</button>

</div>

</div>

<div class="card">

<h3>طلبات الحج المقدمة</h3>

<table>

<tr>
<th>رقم الطلب</th>
<th>اسم المتقدم</th>
<th>نوع الطلب</th>
<th>الحالة</th>
<th>الإجراء</th>
</tr>

<tr>
<td colspan="5">لا توجد طلبات حالياً</td>
</tr>

</table>

</div>

</div>

<script>

function searchOrder(){

let number=document.getElementById("orderNumber").value;

if(number===""){
alert("يرجى إدخال رقم الطلب");
return;
}

window.location.href="search.html?order="+number;

}

</script>

</body>
</html>
