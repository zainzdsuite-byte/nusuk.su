            <label>رقم الهاتف</label>
            <input type="tel" id="phoneNumber" required>
          </div>

          <div>
            <label>عدد المرافقين إن وجد</label>
            <input type="number" id="companionsCount" min="0" value="0" required>
          </div>

          <div>
            <label>أسماء المرافقين</label>
            <textarea id="companionsNames" rows="3" placeholder="اكتب أسماء المرافقين إن وجدوا"></textarea>
          </div>

          <div>
            <label>هل تملك الجواز الأمريكي؟</label>
            <select id="hasUsPassport" required>
              <option value="">اختر</option>
              <option value="نعم">نعم</option>
              <option value="لا">لا</option>
            </select>
          </div>

          <div>
            <label>تاريخ الميلاد</label>
            <input type="date" id="birthDate" required>
          </div>

          <div>
            <label>الجنس</label>
            <select id="gender" required>
              <option value="">اختر</option>
              <option value="ذكر">ذكر</option>
              <option value="أنثى">أنثى</option>
            </select>
          </div>

          <div>
            <label>البريد الإلكتروني</label>
            <input type="email" id="email" required>
          </div>

          <div>
            <label>بلد الإقامة الحالي</label>
            <input type="text" id="currentResidence" required>
          </div>

          <div>
            <label>المهنة</label>
            <input type="text" id="jobTitle">
          </div>

          <div>
            <label>جهة العمل</label>
            <input type="text" id="employer">
          </div>

          <div>
            <label>ملاحظات إضافية</label>
            <textarea id="notes" rows="3" placeholder="أي معلومات إضافية ترغب بإدخالها"></textarea>
          </div>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="agreement" required>
          <label for="agreement">أقر بأن البيانات المدخلة صحيحة وأوافق على تقديم الطلب.</label>
        </div>

        <div class="actions-row">
          <button type="submit">تقديم الطلب</button>

  <script>
