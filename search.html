<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>البحث عن الطلب</title>

<style>

body{
font-family:Tahoma;
direction:rtl;
background:#f5f5f5;
margin:0;
}

header{
background:#2f6b4f;
color:white;
padding:20px;
text-align:center;
font-size:24px;
}

.container{
max-width:800px;
margin:auto;
padding:40px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
width:220px;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:10px 16px;
background:#b9963a;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#9f812f;
}

.result{
margin-top:20px;
font-size:18px;
}

</style>
</head>

<body>

<header>
البحث عن طلب الحج
</header>

<div class="container">

<div class="card">

<h3>إدخال رقم الطلب</h3>

<input type="number" id="searchInput">

<button onclick="search()">بحث</button>

<div class="result" id="result"></div>

</div>

</div>

<script>

const params=new URLSearchParams(window.location.search);
const order=params.get("order");

if(order){
document.getElementById("searchInput").value=order;
}

function search(){

let num=document.getElementById("searchInput").value;

if(num===""){
alert("ادخل رقم الطلب");
return;
}

document.getElementById("result").innerHTML="تم البحث عن الطلب رقم : "+num;

}

</script>

</body>
</html>
