<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>usuk.sa</title>

<style>

body{
margin:0;
padding:0;
font-family:Tahoma, Arial;
direction:rtl;
background:#f5f5f5;
}

header{
background:#0f5132;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.login-box{
width:340px;
background:white;
padding:35px;
margin:100px auto;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
border-top:6px solid #c8a45d;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:6px;
font-size:15px;
}

button{
width:100%;
padding:12px;
background:#c8a45d;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#b89345;
}

</style>
</head>

<body>

<header>
خدمات العمرة والحج
</header>

<div class="login-box">

<h2>تسجيل الدخول</h2>

<form onsubmit="return login()">

<input type="text" id="username" placeholder="اسم المستخدم" required>

<input type="password" id="password" placeholder="كلمة المرور" required>

<button type="submit">تسجيل الدخول</button>

</form>

</div>

<script>

function login(){

let user=document.getElementById("username").value.trim();
let pass=document.getElementById("password").value.trim();

if(user==="bilal1970" && pass==="bilal1970"){

window.location.href="dashboard.html";

}else{

alert("بيانات الدخول غير صحيحة");

}

return false;

}

</script>

</body>
</html>
